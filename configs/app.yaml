app:
  name: book-qa-library
  version: 0.1.0
  env: local
  host: 127.0.0.1
  port: 8000
  debug: false
  log_level: INFO
  request_id_header: X-Request-ID
  api_key: null
  ingest_max_bytes: 52428800
  ocr_enabled: true
  ocr_langs: chi_tra+eng
  ocr_min_text_chars: 80
  ocr_tesseract_cmd: null
  ocr_max_pages: 0
  ocr_page_timeout_seconds: 0
  ocr_total_timeout_seconds: 0
  ocr_isolate_worker: false
  ingest_host_allowlist_enabled: false
  ingest_host_allowlist: []
  cors_allow_origins: []

storage:
  database_url: sqlite:///./data/app.db
  data_dir: ./data

models:
  profile: local
